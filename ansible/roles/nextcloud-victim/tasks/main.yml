---
# Role: nextcloud-victim
# Installiert Nextcloud mit verwundbarer Konfiguration + Dummy-Kundendaten
# auf nc-target (10.99.10.5)
# Angriffspfad: Nextcloud-Admin-Brute-Force -> Kundendaten-Exfil -> Phishing-Daten
#
# Verwundbarkeiten:
# - Admin-Passwort: Top-1000 (123456789)
# - Nextcloud-Version 28.0.0 (manuelles Upgrade deaktiviert)
# - Brute-Force-Schutz deaktiviert (config.php-Anpassung)
# - Datei-Sharing ohne Passwortschutz aktiviert

- name: Docker-Abhängigkeiten installieren
  apt:
    name:
      - docker.io
      - docker-compose-v2
      - python3-docker
    state: present
    update_cache: yes

- name: Docker-Dienst aktivieren
  systemd:
    name: docker
    enabled: yes
    state: started

- name: NC-Target-Verzeichnis anlegen
  file:
    path: "/opt/nextcloud"
    state: directory
    owner: root
    group: root
    mode: 0755

- name: Admin-Passwort generieren (pwgen, nicht committed)
  set_fact:
    nc_admin_password: "{{ lookup('password', '/dev/null length=12 chars=ascii_letters,digits') }}"

- name: Admin-Passwort in .env-Datei schreiben (gitignored)
  copy:
    dest: "/opt/nextcloud/.env"
    content: |
      NC_ADMIN_PASSWORD={{ nc_admin_password }}
    mode: 0600

- name: Zugangsdaten-Datei schreiben (gitignored)
  copy:
    dest: "/opt/nextcloud/credentials.txt"
    content: |
      === NC-TARGET ZUGANGSDATEN (PILOT) ===
      URL:      http://10.99.10.5:8090
      Admin:    admin
      Passwort: {{ nc_admin_password }}
      
      Enthaelt Dummy-Kundendaten als Trophy.
      Brute-Force-Schutz ist deaktiviert.
      Passwort ist Top-1000-Liste (fuer Demo)/pwgen (fuer Produktion).
    mode: 0600

- name: Nextcloud + MariaDB Docker-Compose bereitstellen
  copy:
    dest: "/opt/nextcloud/docker-compose.yml"
    content: |
      services:
        nc-mariadb:
          image: mariadb:10.11
          container_name: nc-mariadb
          restart: unless-stopped
          environment:
            MYSQL_ROOT_PASSWORD: nc_root_secret
            MYSQL_DATABASE: nextcloud
            MYSQL_USER: nextcloud
            MYSQL_PASSWORD: nc_db_pass
          volumes:
            - nc_db:/var/lib/mysql

        nc-nextcloud:
          image: nextcloud:28.0.0-apache
          container_name: nc-nextcloud
          restart: unless-stopped
          ports:
            - "10.99.10.5:8090:80"
          environment:
            MYSQL_HOST: nc-mariadb
            MYSQL_DATABASE: nextcloud
            MYSQL_USER: nextcloud
            MYSQL_PASSWORD: nc_db_pass
            NEXTCLOUD_ADMIN_USER: admin
            NEXTCLOUD_ADMIN_PASSWORD: ${NC_ADMIN_PASSWORD}
            NEXTCLOUD_TRUSTED_DOMAINS: "10.99.10.5 localhost"
            OVERWRITEPROTOCOL: http
            OVERWRITECLIURL: http://10.99.10.5
          volumes:
            - nc_data:/var/www/html
            - ./config.php.override:/var/www/html/config/config.php.override
          depends_on:
            - nc-mariadb

      volumes:
        nc_db:
        nc_data:
    mode: 0644

- name: Vulnerable config.php erstellen (Brute-Force-Schutz deaktiviert)
  copy:
    dest: "/opt/nextcloud/config.php.override"
    content: |
      <?php
      $CONFIG = [
        'overwriteprotocol' => 'http',
        'overwritewebroot' => '/',
        'overwrite.cli.url' => 'http://10.99.10.5:8090',
        'trusted_domains' => ['10.99.10.5', 'localhost', '10.99.10.5:8090'],,
        'default_phone_region' => 'DE',
        'password_policy.min_length' => 1,
        'password_policy.enforce_numeric_chars' => false,
        'password_policy.enforce_special_chars' => false,
        'password_policy.enforce_upper_lower_case' => false,
        'bruteforce_protection.enabled' => false,
        'shareapi_default_permissions' => 31,
        'allow_user_to_change_display_name' => true,
        'shareapi_allow_public_upload' => true,
        'shareapi_allow_public_link_sharing' => true,
        'shareapi_allow_public_link_mail' => true,
        'shareapi_default_expire_date' => false,
        'lost_password_link' => 'disabled',
        'enable_previews' => false,
        'enable_file_metadata' => false,
      ];
    mode: 0644

- name: Nextcloud + MariaDB starten
  command:
    cmd: docker compose up -d
    chdir: /opt/nextcloud
  register: nc_up
  changed_when: "'Started' in nc_up.stdout or 'Container' in nc_up.stdout"
  failed_when: false

- name: Auf Nextcloud warten
  uri:
    url: "http://10.99.10.5:8090"
    status_code: 200,302
    timeout: 120
  register: nc_check
  retries: 15
  delay: 6
  until: nc_check.status == 200 or nc_check.status == 302
  ignore_errors: yes

- name: Dummy-Kundendaten-Verzeichnis anlegen
  file:
